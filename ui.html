<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Localizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
      background: #fff;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111;
    }

    .section {
      margin-bottom: 16px;
    }

    .section label.group-label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .radio-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      transition: border-color 0.15s;
    }

    .radio-group input[type="radio"] {
      accent-color: #18a0fb;
    }

    .radio-group label:has(input:checked) {
      border-color: #18a0fb;
      background: #f0f8ff;
    }

    select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      color: #333;
      background: #fff;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #18a0fb;
    }

    .hidden { display: none; }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #applyBtn {
      background: #18a0fb;
      color: #fff;
    }

    #undoBtn {
      background: #f0f0f0;
      color: #333;
    }
  </style>
</head>
<body>
  <h2>Content Localizer</h2>

  <div class="section">
    <label class="group-label">Scope</label>
    <div class="radio-group">
      <label><input type="radio" name="scope" value="selection" checked /> Selection</label>
      <label><input type="radio" name="scope" value="page" /> Current Page</label>
      <label><input type="radio" name="scope" value="all" /> All Pages</label>
    </div>
  </div>

  <div class="section">
    <label class="group-label">Mode</label>
    <div class="radio-group">
      <label><input type="radio" name="mode" value="translate" checked /> Translate</label>
      <label><input type="radio" name="mode" value="stress" /> Stress Test</label>
    </div>
  </div>

  <div class="section" id="translateSection">
    <label class="group-label">Language</label>
    <select id="translateLang">
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="ja">Japanese</option>
    </select>
  </div>

  <div class="section hidden" id="stressSection">
    <label class="group-label">Expansion Language</label>
    <select id="stressLang">
      <option value="de">German (~35% longer)</option>
      <option value="fi">Finnish (~50% longer)</option>
    </select>
  </div>

  <div class="button-row">
    <button id="applyBtn">Apply</button>
    <button id="undoBtn">Undo</button>
  </div>

  <script>
    const modeRadios = document.querySelectorAll('input[name="mode"]');
    const translateSection = document.getElementById('translateSection');
    const stressSection = document.getElementById('stressSection');

    modeRadios.forEach((radio) => {
      radio.addEventListener('change', () => {
        const isStress = document.querySelector('input[name="mode"]:checked').value === 'stress';
        translateSection.classList.toggle('hidden', isStress);
        stressSection.classList.toggle('hidden', !isStress);
      });
    });

    document.getElementById('applyBtn').addEventListener('click', () => {
      const scope = document.querySelector('input[name="scope"]:checked').value;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const lang = mode === 'stress'
        ? document.getElementById('stressLang').value
        : document.getElementById('translateLang').value;

      parent.postMessage({ pluginMessage: { type: 'apply', scope, mode, lang } }, '*');
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'undo' } }, '*');
    });
  </script>
</body>
</html>
